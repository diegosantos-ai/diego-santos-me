# Configuração exclusiva para testes
# DataSource é mockado via @MockitoBean — nenhuma conexão real ocorre

spring.datasource.url=jdbc:postgresql://localhost:5432/portfolio_test
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA — desabilitar validacao de schema (DataSource é mock)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Flyway — desabilitado em testes unitarios
spring.flyway.enabled=false

# Scheduler desabilitado em testes
learning.enabled=false
