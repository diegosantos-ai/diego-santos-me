# Configuração exclusiva para testes (CI e local)
# Este arquivo é carregado automaticamente pelo Spring Boot nos contextos de test

# Base de Dados de Teste (PostgreSQL via service container no CI)
spring.datasource.url=jdbc:postgresql://localhost:5432/portfolio_test
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA — validação leve em testes
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Flyway — ativo para criar schema antes dos testes rodarem
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Desabilitar scheduler em testes para evitar disparo de jobs agendados
learning.enabled=false
