# docker-compose.prod.yml (Ambiente PRODUÇÃO / VPS)
# Para executar na VPS: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  nginx:
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../certbot/conf:/etc/letsencrypt:ro
      - ../certbot/www:/var/www/certbot:ro

  postgres:
    restart: always
    # Nenhuma porta exposta no host local em prod. Somente a rede interna verá a 5432!
    environment:
      POSTGRES_DB: ${DB_NAME:-portfolio_prod}
      POSTGRES_USER: ${DB_USER:-portfolio_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-portfolio_user} -d ${DB_NAME:-portfolio_prod}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  web-app:
    image: ghcr.io/diegosantos-ai/portfolio-web-app:latest
    restart: always
    environment:
      - INTERNAL_API_URL=${INTERNAL_API_URL:-http://portfolio-api-java:8080/api/v1}
    volumes:
      - ../runtime-content/content:/app/content:ro
      - ../runtime-content/study-assets:/app/public/study-assets:ro
    # Nenhuma porta web-app exposta para o host, o Nginx tratará do roteamento
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  portfolio-api-java:
    image: ghcr.io/diegosantos-ai/portfolio-api-java:latest
    restart: always
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${DB_NAME:-portfolio_prod}
      - SPRING_DATASOURCE_USERNAME=${DB_USER:-portfolio_user}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=${SPRING_JPA_HIBERNATE_DDL_AUTO:-none}
      - SPRING_PROFILES_ACTIVE=prod
      - LEARNING_ENABLED=${LEARNING_ENABLED:-true}
      - LEARNING_REPOSITORIES=${LEARNING_REPOSITORIES:-diegosantos-ai/diego-santos-me}
      - LEARNING_AUTO_PUBLISH=${LEARNING_AUTO_PUBLISH:-true}
      - LEARNING_CRON_SCHEDULE=${LEARNING_CRON_SCHEDULE:-0 0 */6 * * *}
      - LEARNING_ADMIN_TOKEN=${LEARNING_ADMIN_TOKEN:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - LLM_API_KEY=${LLM_API_KEY}
    # Nenhuma porta portfolio-api-java exposta para o host, o Nginx tratará do roteamento
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/v1/actuator/health | grep -q 'UP' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  certbot:
    image: certbot/certbot:latest
    container_name: portfolio_certbot
    restart: unless-stopped
    volumes:
      - ../certbot/conf:/etc/letsencrypt
      - ../certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
