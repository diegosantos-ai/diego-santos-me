services:
  # Template minimal de serviço para projetos que adotam a rede unificada.
  # Consulte ../ports/ports.md para o padrão de portas recomendado.
  app:
    image: alpine:latest
    command: tail -f /dev/null
    networks:
      - dev-workspace-net
    # Exemplo de como mapear porta do host via variável (padrão seguindo a convenção):
    # ports:
    #   - "${APP_PORT:-8001}:${APP_INTERNAL_PORT:-8000}"
    # Exemplo utilizando o banco unificado (infra-core):
    # environment:
    #   - DATABASE_URL=postgres://devroot:devpassword@core-postgres:5432/meu_projeto_db

networks:
  dev-workspace-net:
    external: true
    name: dev-workspace-net
