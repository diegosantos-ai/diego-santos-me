# docker-compose.override.yml (Ambiente DEV)
# Lido automaticamente pelo comando `docker compose up`

services:
  nginx:
    # No fluxo local o proxy fica opcional, porque frontend e API rodam manualmente no host.
    profiles:
      - proxy

  postgres:
    restart: unless-stopped
    env_file:
      - ../../envs/.env
    environment:
      POSTGRES_DB: ${DB_NAME:-portfolio_dev}
      POSTGRES_USER: ${DB_USER:-portfolio_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-portfolio_secret}
    # Mantemos portas abertas para poder conectar via dBeaver localmente
    ports:
      - "${DB_PORT:-5435}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-portfolio_user} -d ${DB_NAME:-portfolio_dev}" ]
      interval: 5s
      timeout: 5s
      retries: 10

  web-app:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ../../apps/web-app:/app
    # Mantido como shell opcional; o frontend principal roda via `make web-dev`.
    entrypoint: [ "tail", "-f", "/dev/null" ]
    profiles:
      - shell

  portfolio-api-java:
    image: eclipse-temurin:21-jdk-alpine
    working_dir: /app
    volumes:
      - ../../apps/portfolio-api-java:/app
    # Mantido como shell opcional; a API principal roda via `make api-dev`.
    entrypoint: [ "tail", "-f", "/dev/null" ]
    profiles:
      - shell
    env_file:
      - ../../envs/.env
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${DB_NAME:-portfolio_dev}
      - SPRING_DATASOURCE_USERNAME=${DB_USER:-portfolio_user}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-portfolio_secret}
