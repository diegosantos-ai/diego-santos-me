name: Editorial — Validate and Publish

on:
  pull_request:
    branches: [develop, main]
    paths:
      - 'content/**'
      - 'apps/web-app/public/study-assets/**'
  push:
    branches: [main]
    paths:
      - 'content/**'
      - 'apps/web-app/public/study-assets/**'
  workflow_dispatch:

jobs:
  validate:
    name: Validate Editorial Content
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web-app/package-lock.json

      - name: Install dependencies
        working-directory: apps/web-app
        run: npm ci

      - name: Validate editorial frontmatter and asset links
        working-directory: apps/web-app
        run: node scripts/validate-editorial-content.mjs

      - name: Check editorial formatting
        working-directory: apps/web-app
        run: |
          npx prettier --check ../../content/articles
          npx prettier --check ../../content/study-resources
          npx prettier --check public/study-assets

  publish:
    name: Publish Editorial Content
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy editorial files to staging on VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.OVH_VPS_HOST }}
          username: ${{ secrets.OVH_VPS_USER }}
          key: ${{ secrets.OVH_SSH_PRIVATE_KEY }}
          source: "content/,apps/web-app/public/study-assets/"
          target: "~/portfolio-deploy/runtime-content-staging/"

      - name: Publish editorial files on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.OVH_VPS_HOST }}
          username: ${{ secrets.OVH_VPS_USER }}
          key: ${{ secrets.OVH_SSH_PRIVATE_KEY }}
          script: |
            mkdir -p ~/portfolio-deploy/runtime-content/content
            mkdir -p ~/portfolio-deploy/runtime-content/study-assets

            find ~/portfolio-deploy/runtime-content/content -mindepth 1 -maxdepth 1 -exec rm -rf {} +
            find ~/portfolio-deploy/runtime-content/study-assets -mindepth 1 -maxdepth 1 -exec rm -rf {} +

            cp -a ~/portfolio-deploy/runtime-content-staging/content/. ~/portfolio-deploy/runtime-content/content/
            cp -a ~/portfolio-deploy/runtime-content-staging/apps/web-app/public/study-assets/. ~/portfolio-deploy/runtime-content/study-assets/
            rm -rf ~/portfolio-deploy/runtime-content-staging

            ls -R ~/portfolio-deploy/runtime-content | sed -n '1,120p'
