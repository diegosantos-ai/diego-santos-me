name: CI — Build e Validação

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

permissions:
  contents: read
  packages: write

jobs:
  # ============================================================================
  # JOB 1: Lint e Build do Frontend (Next.js)
  # ============================================================================
  frontend:
    name: Frontend — Lint e Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web-app/package-lock.json

      - name: Instalar dependências
        working-directory: apps/web-app
        run: npm ci

      - name: Lint
        working-directory: apps/web-app
        run: npm run lint

      - name: Verificar formatação (Prettier)
        working-directory: apps/web-app
        run: npx prettier --check .

      - name: Log in to the Container registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build da imagem Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web-app/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/portfolio-web-app:latest
            ghcr.io/${{ github.repository_owner }}/portfolio-web-app:${{ github.sha }}

  # ============================================================================
  # JOB 2: Lint e Build do Backend (Spring Boot / Java 21)
  # ============================================================================
  backend:
    name: Backend — Spotless e Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: portfolio_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Permissão do Gradlew
        working-directory: apps/portfolio-api-java
        run: chmod +x gradlew

      - name: Verificar formatação (Spotless)
        working-directory: apps/portfolio-api-java
        run: ./gradlew spotlessCheck --no-daemon

      - name: Build e Testes
        working-directory: apps/portfolio-api-java
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/portfolio_test
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres
          SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop
        run: ./gradlew build --no-daemon


      - name: Log in to the Container registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build da imagem Docker
        uses: docker/build-push-action@v5
        with:
          context: apps/portfolio-api-java
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/portfolio-api-java:latest
            ghcr.io/${{ github.repository_owner }}/portfolio-api-java:${{ github.sha }}
